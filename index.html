<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interactive Computing</title>
  <style>
    :root {
      --cyan: #05ddcb;
      --white: rgba(247, 255, 253, 0.86);
      --white-strong: #f7fffd;
      --line: rgba(247, 255, 253, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      color: var(--white-strong);
      background: var(--cyan);
      font-family: Arial, Helvetica, sans-serif;
      letter-spacing: 0;
      overflow: hidden;
    }

    a,
    button {
      font: inherit;
    }

    .screen {
      position: relative;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
      background:
        linear-gradient(90deg, var(--line) 1px, transparent 1px),
        linear-gradient(0deg, var(--line) 1px, transparent 1px),
        var(--cyan);
      background-size: 84px 84px;
    }

    .screen::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(110deg, transparent 0 42%, rgba(255, 255, 255, 0.12) 42% 42.35%, transparent 42.35%),
        linear-gradient(250deg, transparent 0 61%, rgba(0, 0, 0, 0.07) 61% 61.4%, transparent 61.4%);
      opacity: 0.28;
      pointer-events: none;
    }

    .topbar {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto 24px;
      align-items: center;
      gap: clamp(26px, 8vw, 130px);
      width: min(74vw, 680px);
      margin: clamp(38px, 8vw, 78px) 0 0 clamp(34px, 8vw, 110px);
      text-transform: uppercase;
    }

    .topbar a {
      color: var(--white);
      font-size: clamp(10px, 1vw, 13px);
      font-weight: 700;
      line-height: 1;
      text-decoration: none;
      white-space: nowrap;
    }

    .topbar a::after {
      content: "";
      display: block;
      width: 100%;
      height: 1px;
      margin-top: 8px;
      background: currentColor;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 180ms ease;
    }

    .topbar a:hover::after,
    .topbar a:focus-visible::after {
      transform: scaleX(1);
    }

    .menu {
      width: 24px;
      height: 18px;
      display: grid;
      place-items: center;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .menu[aria-expanded="true"]::before {
      transform: translateY(4px) rotate(45deg);
    }

    .menu[aria-expanded="true"] span {
      transform: scaleX(0);
    }

    .menu[aria-expanded="true"]::after {
      transform: translateY(-4px) rotate(-45deg);
    }

    .menu span,
    .menu::before,
    .menu::after {
      content: "";
      display: block;
      width: 12px;
      height: 2px;
      background: var(--white);
      transition: transform 180ms ease;
    }

    .menu[aria-expanded="false"]:hover::before {
      transform: translateY(-1px);
    }

    .menu[aria-expanded="false"]:hover::after {
      transform: translateY(1px);
    }

    .project-menu {
      position: absolute;
      top: calc(100% + 18px);
      right: 0;
      display: grid;
      gap: 10px;
      min-width: 118px;
      margin: 0;
      padding: 0;
      list-style: none;
      text-align: right;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-8px);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .project-menu.is-open {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .project-menu li {
      opacity: 0;
      transform: translateY(-7px);
      transition: opacity 180ms ease, transform 180ms ease;
      transition-delay: calc(var(--i) * 34ms);
    }

    .project-menu.is-open li {
      opacity: 1;
      transform: translateY(0);
    }

    .project-menu a {
      display: inline-block;
      color: var(--white);
      font-size: clamp(9px, 0.86vw, 12px);
      font-weight: 700;
      line-height: 1;
      text-decoration: none;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .content {
      position: relative;
      z-index: 1;
      align-self: end;
      width: min(76vw, 760px);
      margin: 0 0 clamp(42px, 9vw, 92px) clamp(34px, 8vw, 110px);
    }

    h1 {
      margin: 0;
      max-width: 10ch;
      color: var(--white-strong);
      font-size: clamp(46px, 8.2vw, 116px);
      font-weight: 700;
      line-height: 0.9;
      text-transform: uppercase;
    }

    .caption {
      margin: clamp(18px, 3vw, 28px) 0 0;
      max-width: 32ch;
      color: rgba(247, 255, 253, 0.74);
      font-size: clamp(10px, 1vw, 13px);
      font-weight: 700;
      line-height: 1.6;
      text-transform: uppercase;
    }

    @media (max-width: 720px) {
      body {
        overflow: auto;
      }

      .screen {
        min-height: 100svh;
      }

      .topbar {
        grid-template-columns: 1fr auto;
        width: calc(100% - 44px);
        margin: 28px 22px 0;
        gap: 18px;
      }

      .topbar a:first-child {
        grid-column: 1 / -1;
      }

      .topbar a:nth-child(2) {
        justify-self: start;
      }

      .menu {
        justify-self: end;
      }

      .project-menu {
        top: calc(100% + 14px);
        right: 0;
      }

      .content {
        width: calc(100% - 44px);
        margin: 0 22px 38px;
      }
    }
  </style>
</head>
<body>
  <main class="screen" aria-label="Interactive Computing homepage">
    <nav class="topbar" aria-label="Primary navigation">
      <a href="#home">Interactive Computing</a>
      <a href="#sketch">Sketch Title</a>
      <button class="menu" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="project-menu">
        <span></span>
      </button>
      <ul class="project-menu" id="project-menu">
        <li style="--i: 1"><a href="01_name/index.html">01_name</a></li>
        <li style="--i: 2"><a href="02_mood/index.html">02_mood</a></li>
        <li style="--i: 3"><a href="03_graphic/index.html">03_graphic</a></li>
        <li style="--i: 4"><a href="04_Geometric/index.html">04_Geometric</a></li>
        <li style="--i: 5"><a href="05_wave/index.html">05_wave</a></li>
        <li style="--i: 6"><a href="06_walls/index.html">06_walls</a></li>
        <li style="--i: 7"><a href="07_star/index.html">07_star</a></li>
        <li style="--i: 8"><a href="08_Heigth/index.html">08_Heigth</a></li>
        <li style="--i: 9"><a href="09_glitch/index.html">09_glitch</a></li>
        <li style="--i: 10"><a href="10_words/index.html">10_words</a></li>
        <li style="--i: 11"><a href="11_easing/index.html">11_easing</a></li>
        <li style="--i: 12"><a href="12_voice_color/index.html">12_voice_color</a></li>
        <li style="--i: 13"><a href="13_world/index.html">13_world</a></li>
      </ul>
    </nav>

    <section class="content" id="home">
      <h1>Interactive Computing</h1>
      <p class="caption" id="sketch">A static homepage based on the cyan screen frame.</p>
    </section>
  </main>

  <script>
    const menuButton = document.querySelector(".menu");
    const projectMenu = document.querySelector("#project-menu");

    menuButton.addEventListener("click", () => {
      const isOpen = menuButton.getAttribute("aria-expanded") === "true";
      menuButton.setAttribute("aria-expanded", String(!isOpen));
      projectMenu.classList.toggle("is-open", !isOpen);
    });
  </script>
</body>
</html>
