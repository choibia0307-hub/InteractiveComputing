<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sketch</title>

    <link rel="stylesheet" type="text/css" href="style.css">

    <script src="libraries/p5.min.js"></script>
    <script src="libraries/p5.sound.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.js"></script>

    <style>
      /* 🌟 캔버스를 맨 바닥 레이어로 격리해 글자가 가려지지 않게 방지 */
      canvas {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        z-index: 1 !important;
      }

      /* 상단바 레이아웃 고정 */
      .topbar {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 999999 !important; /* 캔버스 그래픽보다 무조건 위 */
        width: 100%;
        padding-left: clamp(42px, 8.7vw, 112px);
        padding-top: clamp(42px, 8vw, 78px);
        text-transform: uppercase;
        pointer-events: none; /* 마우스 클릭이 캔버스를 관통하도록 설정 */
      }

      /* 좌측 홈 버튼 검은색 스타일 */
      .nav-text {
        margin: 0;
        display: inline-block;
        pointer-events: auto; /* 클릭 활성화 */
        color: #111111 !important; /* 🌟 딥 블랙 컬러 지정 */
        font-family: Arial, Helvetica, sans-serif;
        font-size: clamp(30px, 2.85vw, 39px);
        font-weight: 700;
        line-height: 1;
        white-space: nowrap;
        text-decoration: none;
        transition: opacity 200ms ease;
      }

      .nav-text:hover {
        opacity: 0.6;
      }

      @media (max-width: 720px) {
        .topbar {
          padding-left: 22px;
          padding-top: 32px;
        }
      }
    </style>
  </head>

  <body>
    <header class="topbar">
      <a href="../index.html" class="nav-text">Interactive Computing</a>
    </header>

    <script src="sketch.js"></script>
  </body>
</html>
